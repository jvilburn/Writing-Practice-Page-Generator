<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handwriting Worksheet Generator</title>
  <style>
    /* Font Faces */
    @font-face {
      font-family: 'FRBCursive';
      src: url('fonts/FRBAmericanCursive-400-Regular.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'FRBCursiveDotted';
      src: url('fonts/FRBAmericanCursive-400-Dotted.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'FRBCursiveArrow';
      src: url('fonts/FRBAmericanCursive-400-ArrowPath.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'FRBCursiveGuideDotted';
      src: url('fonts/FRBAmericanCursive-400-GuidelinesArrowsDottedRegular.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    /* Reset & Base */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
      background: #e8e8e8;
    }

    /* App Layout */
    #app {
      display: flex;
      height: 100vh;
    }

    /* Controls Panel */
    #controls h2 {
      margin-bottom: 16px;
    }
    #controls {
      width: 280px;
      min-width: 280px;
      background: #fff;
      border-right: 1px solid #ccc;
      padding: 16px;
      overflow-y: auto;
    }
    .control-group {
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid #eee;
    }
    .control-group:last-of-type {
      border-bottom: none;
    }
    .control-group h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-bottom: 8px;
    }
    .control-group label {
      display: block;
      margin-bottom: 4px;
      cursor: pointer;
    }
    .control-group label input[type="radio"],
    .control-group label input[type="checkbox"] {
      margin-right: 6px;
    }
    .control-group textarea {
      width: 100%;
      height: 80px;
      resize: vertical;
      font-family: inherit;
      font-size: 13px;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .control-group input[type="range"] {
      width: 100%;
    }
    .control-group input[type="number"] {
      width: 60px;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    .range-value {
      font-size: 12px;
      color: #666;
      margin-left: 6px;
    }
    .hidden {
      display: none;
    }
    #printBtn {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    #printBtn:hover {
      background: #1d4ed8;
    }

    /* Line Groups */
    .line-group {
      position: relative;
      width: 100%;
    }
    .line-group .top-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      border-top: 1px solid #999;
    }
    .line-group .mid-line {
      position: absolute;
      left: 0;
      right: 0;
      border-top: 1px dashed #bbb;
    }
    .line-group .base-line {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      border-top: 1.5px solid #999;
    }
    /* Preview Container */
    #preview-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: auto;
    }

    /* Preview Page */
    #preview {
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      position: relative;
      overflow: hidden;
      padding: 0.4in 0.5in;
    }
    #preview.landscape {
      width: 11in;
      height: 8.5in;
    }
    #preview.portrait {
      width: 8.5in;
      height: 11in;
    }

    /* Print Styles */
    @media print {
      #controls {
        display: none !important;
      }
      #preview-container {
        padding: 0;
        display: block;
      }
      #preview {
        width: 100% !important;
        height: 100% !important;
        box-shadow: none;
        border: none;
        margin: 0;
      }
      body {
        background: white;
      }
    }
  </style>
  <style id="page-orientation">
    @page {
      size: landscape letter;
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <aside id="controls">
      <h2>Worksheet Settings</h2>

      <div class="control-group">
        <h3>Letter Style</h3>
        <label><input type="radio" name="letterStyle" value="print" checked> Print (block)</label>
        <label><input type="radio" name="letterStyle" value="cursive"> Cursive</label>
      </div>

      <div class="control-group">
        <h3>Practice Mode</h3>
        <label><input type="radio" name="mode" value="trace" checked> Trace (gray/dotted)</label>
        <label><input type="radio" name="mode" value="copy"> Copy (model + blank lines)</label>
      </div>

      <div class="control-group">
        <h3>Line Style</h3>
        <label><input type="radio" name="lineStyle" value="ruled" checked> 3-line ruled</label>
        <label><input type="radio" name="lineStyle" value="baseline"> Simple baseline</label>
      </div>

      <div class="control-group">
        <label><input type="checkbox" id="strokeGuide"> Show stroke guidance</label>
      </div>

      <div class="control-group">
        <h3>Content</h3>
        <label><input type="radio" name="content" value="alphabet" checked> Full Alphabet</label>
        <label><input type="radio" name="content" value="custom"> Custom</label>
        <div id="alphabetOptions">
          <label><input type="checkbox" id="uppercase" checked> Uppercase</label>
          <label><input type="checkbox" id="lowercase" checked> Lowercase</label>
        </div>
        <div id="customInput" class="hidden">
          <textarea id="customText" placeholder="Type words or sentences here..."></textarea>
        </div>
      </div>

      <div class="control-group">
        <h3>Font Size</h3>
        <input type="range" id="fontSize" min="24" max="72" value="48">
        <span class="range-value" id="fontSizeValue">48px</span>
      </div>

      <div class="control-group" id="traceRepGroup">
        <h3>Trace Repetitions</h3>
        <input type="number" id="traceReps" min="1" max="20" value="4">
      </div>

      <div class="control-group hidden" id="blankLinesGroup">
        <h3>Blank Practice Lines</h3>
        <input type="number" id="blankLines" min="1" value="3">
      </div>

      <div class="control-group">
        <h3>Orientation</h3>
        <label><input type="radio" name="orientation" value="landscape" checked> Landscape</label>
        <label><input type="radio" name="orientation" value="portrait"> Portrait</label>
      </div>

      <button id="printBtn">Print / Save PDF</button>
    </aside>
    <main id="preview-container">
      <div id="preview" class="landscape">
        <!-- Live preview renders here -->
      </div>
    </main>
  </div>
  <script>
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    function getVal(name) {
      const el = $(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function updateVisibility() {
      const mode = getVal('mode');
      const content = getVal('content');

      // Trace reps vs blank lines
      $('#traceRepGroup').classList.toggle('hidden', mode !== 'trace');
      $('#blankLinesGroup').classList.toggle('hidden', mode !== 'copy');

      // Alphabet options vs custom textarea
      $('#alphabetOptions').classList.toggle('hidden', content !== 'alphabet');
      $('#customInput').classList.toggle('hidden', content !== 'custom');
    }

    function updateOrientation() {
      const orientation = getVal('orientation');
      const preview = $('#preview');
      preview.classList.toggle('landscape', orientation === 'landscape');
      preview.classList.toggle('portrait', orientation === 'portrait');

      // Update @page rule
      $('#page-orientation').textContent =
        `@page { size: ${orientation} letter; margin: 0; }`;
    }

    function updateFontSizeLabel() {
      $('#fontSizeValue').textContent = $('#fontSize').value + 'px';
    }

    function renderPreview() {
      const preview = $('#preview');
      preview.innerHTML = '';

      const lineStyle = getVal('lineStyle');
      const fontSize = parseInt($('#fontSize').value);
      // Line height: ascender space + x-height + descender space + gap
      const lineHeight = fontSize * 2.4;
      // Midline sits at roughly 50% of the writing area (top of x-height)
      const midRatio = 0.42;

      const availableHeight = preview.clientHeight - parseFloat(getComputedStyle(preview).paddingTop) * 2;
      const lineCount = Math.floor(availableHeight / lineHeight);

      for (let i = 0; i < lineCount; i++) {
        const group = document.createElement('div');
        group.className = 'line-group';
        group.style.height = lineHeight + 'px';

        if (lineStyle === 'ruled') {
          const top = document.createElement('div');
          top.className = 'top-line';
          group.appendChild(top);

          const mid = document.createElement('div');
          mid.className = 'mid-line';
          mid.style.top = (lineHeight * midRatio) + 'px';
          group.appendChild(mid);

          const base = document.createElement('div');
          base.className = 'base-line';
          group.appendChild(base);
        } else {
          const base = document.createElement('div');
          base.className = 'base-line';
          group.appendChild(base);
        }

        preview.appendChild(group);
      }
    }

    // Wire up all controls to re-render
    function wireControls() {
      const renderInputs = [
        ...$$('input[name="mode"]'),
        ...$$('input[name="content"]'),
        ...$$('input[name="lineStyle"]'),
        ...$$('input[name="letterStyle"]'),
        ...$$('input[name="orientation"]'),
      ];
      renderInputs.forEach(el => el.addEventListener('change', () => {
        updateVisibility();
        updateOrientation();
        renderPreview();
      }));

      $('#fontSize').addEventListener('input', () => {
        updateFontSizeLabel();
        renderPreview();
      });

      $('#traceReps').addEventListener('change', renderPreview);
      $('#blankLines').addEventListener('change', renderPreview);
      $('#uppercase').addEventListener('change', renderPreview);
      $('#lowercase').addEventListener('change', renderPreview);
      $('#strokeGuide').addEventListener('change', renderPreview);
      $('#customText').addEventListener('input', renderPreview);
      $('#printBtn').addEventListener('click', () => window.print());
    }

    // Initialize
    wireControls();
    updateVisibility();
    updateOrientation();
    renderPreview();
  </script>
</body>
</html>
