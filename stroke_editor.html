<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stroke Guidance Editor</title>
<style>
  @font-face {
    font-family: 'Schoolroom';
    src: url('Schoolroom.ttf') format('truetype');
  }
  @font-face {
    font-family: 'SchoolroomGuidance';
    src: url('SchoolroomGuidance.ttf') format('truetype');
  }
  body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
  .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
  .controls button { padding: 6px 14px; cursor: pointer; }
  .char-btn { width: 36px; height: 36px; font-size: 18px; cursor: pointer; border: 1px solid #ccc; background: #fff; }
  .char-btn.active { background: #4a90d9; color: #fff; border-color: #4a90d9; }
  .char-btn.modified { border-color: #e67e22; border-width: 2px; }
  #canvas-wrap { position: relative; display: inline-block; border: 1px solid #999; background: #fff; }
  canvas { display: block; }
  #overlay { position: absolute; top: 0; left: 0; cursor: default; }
  .info { margin-top: 10px; font-size: 13px; color: #555; }
  .letter-grid { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 10px; }
  .section-label { font-weight: bold; margin: 8px 0 4px; }
  #status { color: #27ae60; font-weight: bold; margin-left: 10px; }
  .stroke-info { margin-top: 10px; font-size: 13px; }
  .stroke-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; flex-wrap: wrap; }
</style>
</head>
<body>
<h2>Stroke Guidance Editor</h2>
<p class="info">
  Click a sub-glyph to select it (arrow or number). Drag the body to translate.
  Drag the rotation handle (small circle) to rotate. Hit Save to write back to the font.
</p>

<div class="section-label">Uppercase</div>
<div class="letter-grid" id="upper-grid"></div>
<div class="section-label">Lowercase</div>
<div class="letter-grid" id="lower-grid"></div>

<div class="controls">
  <span>Scale: <input type="range" id="scale" min="0.5" max="3" step="0.25" value="1"> <span id="scale-val">1</span>x</span>
  <button id="save-btn" style="background:#2ecc71;color:#fff;font-weight:bold">Save to Font</button>
  <button id="reload-btn">Reload from Font</button>
  <span id="status"></span>
</div>

<div id="canvas-wrap">
  <canvas id="bg"></canvas>
  <canvas id="overlay"></canvas>
</div>

<div class="stroke-info" id="stroke-info"></div>

<script>
// Editor state
let currentChar = 'A';
let scale = 1;
let fontData = null;  // { cap, glyphs: {charName: {advance, layers: [{name, contours: [[{x,y,on}]], transform: {dx,dy,rot}}]}} }
let modified = new Set();
let selectedLayer = -1;  // index into current char's layers (excluding base)
let drag = null;  // { type: 'translate'|'rotate', startX, startY, origTransform }

// Canvas constants
const CAP = 688;  // will be overwritten by font data
const PAD = 60;
const VISIBLE_TOP = -180;   // font units above baseline we show
const VISIBLE_BOTTOM = 900; // font units below baseline we show

function fontToPixel(x, y) {
  // Font y goes up, screen y goes down. Scale by `scale`.
  // Visible range: x=[0, advance], y in font=[VISIBLE_BOTTOM_fontY .. VISIBLE_TOP_fontY]
  // We want y=VISIBLE_TOP (in code units; in FONT units that means cap*something) at top of canvas
  const px = x * scale + PAD;
  // Font y: 0=baseline, cap=cap top. Canvas y: 0=top, grows down.
  // Let canvas_y for font_y = (VISIBLE_TOP - font_y) * scale + PAD
  const py = (fontTop() - y) * scale + PAD;
  return [px, py];
}

function pixelToFont(px, py) {
  return [(px - PAD) / scale, fontTop() - (py - PAD) / scale];
}

function fontTop() {
  // top of canvas in font y-coords (above cap height)
  return (fontData ? fontData.cap : CAP) + 200;
}
function fontBottom() {
  return -400;
}

async function loadFont() {
  const res = await fetch('/font-data');
  if (!res.ok) throw new Error('Failed to fetch font data');
  fontData = await res.json();
  console.log('Loaded font data', fontData);
  buildGrid();
  selectChar('A');
}

function buildGrid() {
  const upperGrid = document.getElementById('upper-grid');
  const lowerGrid = document.getElementById('lower-grid');
  upperGrid.innerHTML = '';
  lowerGrid.innerHTML = '';
  for (let i = 65; i <= 90; i++) {
    const ch = String.fromCharCode(i);
    const btn = document.createElement('button');
    btn.className = 'char-btn';
    btn.textContent = ch;
    btn.dataset.char = ch;
    btn.onclick = () => selectChar(ch);
    upperGrid.appendChild(btn);
  }
  for (let i = 97; i <= 122; i++) {
    const ch = String.fromCharCode(i);
    const btn = document.createElement('button');
    btn.className = 'char-btn';
    btn.textContent = ch;
    btn.dataset.char = ch;
    btn.onclick = () => selectChar(ch);
    lowerGrid.appendChild(btn);
  }
  updateButtonStyles();
}

function selectChar(ch) {
  currentChar = ch;
  selectedLayer = -1;
  document.querySelectorAll('.char-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.char === ch);
  });
  render();
  updateStrokeInfo();
}

function updateButtonStyles() {
  document.querySelectorAll('.char-btn').forEach(b => {
    b.classList.toggle('modified', modified.has(b.dataset.char));
  });
}

function getCurrentGlyph() {
  return fontData.glyphs[currentChar];
}

function applyTransform(pt, tf) {
  if (!tf) return pt;
  const rad = (tf.rot || 0) * Math.PI / 180;
  const cx = tf.cx || 0, cy = tf.cy || 0;
  const x = pt.x - cx, y = pt.y - cy;
  const rx = x * Math.cos(rad) - y * Math.sin(rad) + cx + (tf.dx || 0);
  const ry = x * Math.sin(rad) + y * Math.cos(rad) + cy + (tf.dy || 0);
  return { x: rx, y: ry };
}

function layerCentroid(layer) {
  // Centroid of all points across all contours
  let sx = 0, sy = 0, n = 0;
  for (const c of layer.contours) {
    for (const p of c) {
      sx += p.x; sy += p.y; n++;
    }
  }
  return n > 0 ? { x: sx/n, y: sy/n } : { x: 0, y: 0 };
}

function render() {
  const bg = document.getElementById('bg');
  const overlay = document.getElementById('overlay');
  const g = getCurrentGlyph();
  if (!g) return;

  const width = Math.ceil(g.advance * scale) + PAD * 2;
  const height = Math.ceil((fontTop() - fontBottom()) * scale) + PAD;
  bg.width = overlay.width = width;
  bg.height = overlay.height = height;

  const bgCtx = bg.getContext('2d');
  const ol = overlay.getContext('2d');

  bgCtx.clearRect(0, 0, width, height);

  // Writing lines
  const [_, baseY] = fontToPixel(0, 0);
  const [__, capY] = fontToPixel(0, fontData.cap);
  const [___, midY] = fontToPixel(0, fontData.cap * 0.5);
  const [____, descY] = fontToPixel(0, -fontData.cap * 0.4);

  bgCtx.strokeStyle = '#ccc';
  bgCtx.lineWidth = 1;
  bgCtx.beginPath(); bgCtx.moveTo(0, capY); bgCtx.lineTo(width, capY); bgCtx.stroke();
  bgCtx.setLineDash([4,4]);
  bgCtx.beginPath(); bgCtx.moveTo(0, midY); bgCtx.lineTo(width, midY); bgCtx.stroke();
  bgCtx.setLineDash([]);
  bgCtx.lineWidth = 2;
  bgCtx.beginPath(); bgCtx.moveTo(0, baseY); bgCtx.lineTo(width, baseY); bgCtx.stroke();
  bgCtx.lineWidth = 1;
  bgCtx.strokeStyle = '#eee';
  bgCtx.beginPath(); bgCtx.moveTo(0, descY); bgCtx.lineTo(width, descY); bgCtx.stroke();

  // Draw each layer
  ol.clearRect(0, 0, width, height);
  g.layers.forEach((layer, idx) => {
    const isBase = idx === 0;
    const isSelected = (selectedLayer === idx - 1);
    ol.fillStyle = isBase ? 'rgba(0,0,0,0.15)' : (isSelected ? 'rgba(230,80,80,0.9)' : 'rgba(230,80,80,0.6)');
    drawLayer(ol, layer);

    if (!isBase && isSelected) {
      drawHandles(ol, layer);
    }
  });

  // Advance width marker
  const [advX, _advY] = fontToPixel(g.advance, 0);
  bgCtx.strokeStyle = '#bbb';
  bgCtx.lineWidth = 1;
  bgCtx.beginPath();
  bgCtx.moveTo(advX, 0);
  bgCtx.lineTo(advX, height);
  bgCtx.stroke();
}

function drawLayer(ctx, layer) {
  ctx.beginPath();
  for (const contour of layer.contours) {
    if (contour.length === 0) continue;
    const tp = applyTransform(contour[0], layer.transform);
    let [px, py] = fontToPixel(tp.x, tp.y);
    ctx.moveTo(px, py);
    for (let i = 1; i < contour.length; i++) {
      const t = applyTransform(contour[i], layer.transform);
      [px, py] = fontToPixel(t.x, t.y);
      ctx.lineTo(px, py);
    }
    ctx.closePath();
  }
  ctx.fill('evenodd');
}

function drawHandles(ctx, layer) {
  const c = layerCentroid(layer);
  const tc = {
    x: c.x + (layer.transform.dx || 0),
    y: c.y + (layer.transform.dy || 0),
  };
  const [cx, cy] = fontToPixel(tc.x, tc.y);

  // Translate handle (square at centroid)
  ctx.fillStyle = '#3498db';
  ctx.fillRect(cx - 6, cy - 6, 12, 12);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(cx - 6, cy - 6, 12, 12);

  // Rotation handle: 40px above centroid along the current rotation direction
  const rad = (layer.transform.rot || 0) * Math.PI / 180;
  const dist = 45;
  const hx = cx + Math.sin(rad) * dist;
  const hy = cy - Math.cos(rad) * dist;

  ctx.strokeStyle = '#3498db';
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(hx, hy);
  ctx.stroke();

  ctx.fillStyle = '#3498db';
  ctx.beginPath();
  ctx.arc(hx, hy, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.stroke();
}

function hitTest(px, py) {
  // Returns { layerIdx, type } or null
  const g = getCurrentGlyph();
  if (!g) return null;

  // Check handles of currently selected layer first
  if (selectedLayer >= 0 && selectedLayer + 1 < g.layers.length) {
    const layer = g.layers[selectedLayer + 1];
    const c = layerCentroid(layer);
    const tc = {
      x: c.x + (layer.transform.dx || 0),
      y: c.y + (layer.transform.dy || 0),
    };
    const [cx, cy] = fontToPixel(tc.x, tc.y);
    // Translate square
    if (Math.abs(px - cx) <= 8 && Math.abs(py - cy) <= 8) {
      return { layerIdx: selectedLayer, type: 'translate' };
    }
    // Rotate handle
    const rad = (layer.transform.rot || 0) * Math.PI / 180;
    const hx = cx + Math.sin(rad) * 45;
    const hy = cy - Math.cos(rad) * 45;
    if (Math.hypot(px - hx, py - hy) <= 10) {
      return { layerIdx: selectedLayer, type: 'rotate' };
    }
  }

  // Otherwise hit-test every non-base layer's bbox
  for (let i = g.layers.length - 1; i >= 1; i--) {
    const layer = g.layers[i];
    // Compute transformed bbox
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const contour of layer.contours) {
      for (const pt of contour) {
        const t = applyTransform(pt, layer.transform);
        if (t.x < minX) minX = t.x;
        if (t.y < minY) minY = t.y;
        if (t.x > maxX) maxX = t.x;
        if (t.y > maxY) maxY = t.y;
      }
    }
    const [x1, y1] = fontToPixel(minX, maxY);  // top-left (maxY because font y up)
    const [x2, y2] = fontToPixel(maxX, minY);  // bottom-right
    if (px >= x1 && px <= x2 && py >= y1 && py <= y2) {
      return { layerIdx: i - 1, type: 'select' };
    }
  }
  return null;
}

function updateStrokeInfo() {
  const container = document.getElementById('stroke-info');
  const g = getCurrentGlyph();
  if (!g) { container.innerHTML = ''; return; }

  const nLayers = g.layers.length - 1;  // exclude base
  let html = `<strong>${currentChar}</strong> (advance: ${g.advance}) — ${nLayers} guidance sub-glyphs`;
  if (selectedLayer >= 0) {
    const l = g.layers[selectedLayer + 1];
    html += `<br>Selected: <code>${l.name}</code> &nbsp; dx=${(l.transform.dx||0).toFixed(0)} dy=${(l.transform.dy||0).toFixed(0)} rot=${(l.transform.rot||0).toFixed(1)}°`;
    html += ` <button onclick="resetLayer()">Reset</button>`;
  }
  container.innerHTML = html;
}

window.resetLayer = function() {
  if (selectedLayer < 0) return;
  const g = getCurrentGlyph();
  g.layers[selectedLayer + 1].transform = { dx: 0, dy: 0, rot: 0 };
  modified.add(currentChar);
  updateButtonStyles();
  render();
  updateStrokeInfo();
};

// Mouse interaction
const overlay = document.getElementById('overlay');
overlay.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  const rect = overlay.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const hit = hitTest(mx, my);
  if (!hit) {
    selectedLayer = -1;
    render();
    updateStrokeInfo();
    return;
  }
  if (hit.type === 'select') {
    selectedLayer = hit.layerIdx;
    render();
    updateStrokeInfo();
  } else {
    selectedLayer = hit.layerIdx;
    const g = getCurrentGlyph();
    const layer = g.layers[selectedLayer + 1];
    drag = {
      type: hit.type,
      startX: mx, startY: my,
      origTransform: { ...layer.transform },
      centroid: layerCentroid(layer),
    };
    render();
    updateStrokeInfo();
  }
});

overlay.addEventListener('mousemove', e => {
  if (!drag) return;
  const rect = overlay.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const g = getCurrentGlyph();
  const layer = g.layers[selectedLayer + 1];

  if (drag.type === 'translate') {
    const [fx1, fy1] = pixelToFont(drag.startX, drag.startY);
    const [fx2, fy2] = pixelToFont(mx, my);
    layer.transform = {
      ...drag.origTransform,
      dx: (drag.origTransform.dx || 0) + (fx2 - fx1),
      dy: (drag.origTransform.dy || 0) + (fy2 - fy1),
    };
  } else if (drag.type === 'rotate') {
    const c = drag.centroid;
    const tc = {
      x: c.x + (drag.origTransform.dx || 0),
      y: c.y + (drag.origTransform.dy || 0),
    };
    const [cx, cy] = fontToPixel(tc.x, tc.y);
    // Angle from centroid to mouse (in screen space, then back-convert)
    const mouseAngle = Math.atan2(mx - cx, -(my - cy)) * 180 / Math.PI;
    const startAngle = Math.atan2(drag.startX - cx, -(drag.startY - cy)) * 180 / Math.PI;
    layer.transform = {
      ...drag.origTransform,
      rot: (drag.origTransform.rot || 0) + (mouseAngle - startAngle),
    };
  }
  modified.add(currentChar);
  updateButtonStyles();
  render();
  updateStrokeInfo();
});

overlay.addEventListener('mouseup', () => { drag = null; });
overlay.addEventListener('mouseleave', () => { drag = null; });

// Scale
document.getElementById('scale').addEventListener('input', e => {
  scale = parseFloat(e.target.value);
  document.getElementById('scale-val').textContent = scale;
  render();
});

// Save
document.getElementById('save-btn').addEventListener('click', async () => {
  const transforms = {};
  for (const [ch, g] of Object.entries(fontData.glyphs)) {
    const layerTransforms = {};
    for (let i = 1; i < g.layers.length; i++) {
      const l = g.layers[i];
      const tf = l.transform || {};
      if (tf.dx || tf.dy || tf.rot) {
        layerTransforms[l.name] = { dx: tf.dx||0, dy: tf.dy||0, rot: tf.rot||0 };
      }
    }
    if (Object.keys(layerTransforms).length > 0) {
      transforms[ch] = layerTransforms;
    }
  }
  document.getElementById('status').textContent = 'Saving...';
  try {
    const res = await fetch('/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(transforms),
    });
    if (!res.ok) throw new Error(await res.text());
    document.getElementById('status').textContent = 'Saved. Reloading font...';
    modified.clear();
    updateButtonStyles();
    // Reload font
    await loadFont();
    document.getElementById('status').textContent = 'Done.';
  } catch (e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
  }
});

// Reload
document.getElementById('reload-btn').addEventListener('click', () => {
  modified.clear();
  updateButtonStyles();
  loadFont();
});

loadFont().catch(e => {
  document.getElementById('status').textContent = 'Error loading font: ' + e.message;
  console.error(e);
});
</script>
</body>
</html>
