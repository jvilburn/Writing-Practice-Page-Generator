<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stroke Arrow Editor</title>
<style>
  @font-face {
    font-family: 'Andika';
    src: url('Andika-Regular.ttf') format('truetype');
  }
  body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
  .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
  .controls button { padding: 6px 14px; cursor: pointer; }
  .controls select, .controls input { padding: 4px 8px; }
  .char-btn { width: 36px; height: 36px; font-size: 18px; cursor: pointer; border: 1px solid #ccc; background: #fff; }
  .char-btn.active { background: #4a90d9; color: #fff; border-color: #4a90d9; }
  .char-btn.modified { border-color: #e67e22; border-width: 2px; }
  #canvas-wrap { position: relative; display: inline-block; border: 1px solid #999; background: #fff; }
  canvas { display: block; }
  #overlay { position: absolute; top: 0; left: 0; cursor: crosshair; }
  .info { margin-top: 10px; font-size: 13px; color: #555; }
  #output { width: 100%; height: 300px; font-family: monospace; font-size: 12px; margin-top: 10px; }
  .letter-grid { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 10px; }
  .section-label { font-weight: bold; margin: 8px 0 4px; }
  #status { color: #27ae60; font-weight: bold; margin-left: 10px; }
  .stroke-info { margin-top: 10px; font-size: 13px; }
  .stroke-info .stroke-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .stroke-row .color-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .angle-input { width: 60px; }
</style>
</head>
<body>
<h2>Stroke Arrow Editor</h2>
<p class="info">Click a letter, then drag the numbered circles to reposition stroke start points. Adjust angles with the inputs below. Orange-bordered letters have been modified.</p>

<div class="section-label">Uppercase</div>
<div class="letter-grid" id="upper-grid"></div>
<div class="section-label">Lowercase</div>
<div class="letter-grid" id="lower-grid"></div>

<div class="controls">
  <span>Scale: <input type="range" id="scale" min="1" max="6" step="0.5" value="3"> <span id="scale-val">3</span>x</span>
  <button id="export-btn">Export All Modified</button>
  <button id="export-all-btn">Export All</button>
  <button id="reset-btn">Reset Current Letter</button>
  <span id="status"></span>
</div>

<div id="canvas-wrap">
  <canvas id="bg"></canvas>
  <canvas id="overlay"></canvas>
</div>

<div class="stroke-info" id="stroke-info"></div>

<textarea id="output" placeholder="Exported data will appear here..."></textarea>

// Deep clone for working copy
function cloneData(data) {
  const out = {};
  for (const [ch, val] of Object.entries(data)) {
    out[ch] = {
      w: val.w,
      strokes: val.strokes.map(s => ({
        d: s.d,
        start: [...s.start],
        angle: s.angle,
      }))
    };
  }
  return out;
}

// Build letter grid
function buildGrid() {
  const upperGrid = document.getElementById('upper-grid');
  const lowerGrid = document.getElementById('lower-grid');
  for (let i = 65; i <= 90; i++) {
    const ch = String.fromCharCode(i);
    const btn = document.createElement('button');
    btn.className = 'char-btn';
    btn.textContent = ch;
    btn.dataset.char = ch;
    btn.onclick = () => selectChar(ch);
    upperGrid.appendChild(btn);
  }
  for (let i = 97; i <= 122; i++) {
    const ch = String.fromCharCode(i);
    const btn = document.createElement('button');
    btn.className = 'char-btn';
    btn.textContent = ch;
    btn.dataset.char = ch;
    btn.onclick = () => selectChar(ch);
    lowerGrid.appendChild(btn);
  }
}

function selectChar(ch) {
  currentChar = ch;
  document.querySelectorAll('.char-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.char === ch);
  });
  render();
  updateStrokeInfo();
}

function updateButtonStyles() {
  document.querySelectorAll('.char-btn').forEach(b => {
    b.classList.toggle('modified', modified.has(b.dataset.char));
  });
}

function getCanvasSize() {
  const data = strokeData[currentChar];
  if (!data) return { w: 200, h: 300 };
  const isLower = currentChar >= 'a' && currentChar <= 'z';
  // Coordinate space: x in [0, data.w], y in [0, 1] for upper, [0, ~1.4] for lower
  const yMax = isLower ? 1.5 : 1.1;
  const baseUnit = 200; // pixels per 1.0 in coordinate space
  const s = baseUnit * scale;
  return { w: Math.ceil(data.w * s * 2) + 80, h: Math.ceil(yMax * s) + 40, s, yMax };
}

// charPixelWidth = advance width of the char at computed fontSize
// data.w = normalized advance width from STROKE_DATA
// index.html uses: scaleX = charPixelWidth / data.w
// So coord x maps to: x * charPixelWidth / data.w
let renderScaleX = 1; // set during render()

function coordToPixel(x, y, s) {
  return [x * renderScaleX + 20, y * s + 20];
}

function pixelToCoord(px, py, s) {
  return [(px - 20) / renderScaleX, (py - 20) / s];
}

function render() {
  const { w, h, s, yMax } = getCanvasSize();
  bgCanvas.width = overlay.width = w;
  bgCanvas.height = overlay.height = h;

  const data = strokeData[currentChar];
  if (!data) return;

  const isLower = currentChar >= 'a' && currentChar <= 'z';

  // Draw background: writing lines
  bgCtx.clearRect(0, 0, w, h);

  // Top line (y=0)
  bgCtx.strokeStyle = '#ccc';
  bgCtx.lineWidth = 1;
  const [, topY] = coordToPixel(0, 0, s);
  bgCtx.beginPath(); bgCtx.moveTo(0, topY); bgCtx.lineTo(w, topY); bgCtx.stroke();

  // Midline (y=0.5)
  bgCtx.strokeStyle = '#ddd';
  bgCtx.setLineDash([4, 4]);
  const [, midY] = coordToPixel(0, 0.5, s);
  bgCtx.beginPath(); bgCtx.moveTo(0, midY); bgCtx.lineTo(w, midY); bgCtx.stroke();
  bgCtx.setLineDash([]);

  // Baseline (y=1)
  bgCtx.strokeStyle = '#ccc';
  bgCtx.lineWidth = 2;
  const [, baseY] = coordToPixel(0, 1.0, s);
  bgCtx.beginPath(); bgCtx.moveTo(0, baseY); bgCtx.lineTo(w, baseY); bgCtx.stroke();

  // Descender line (y=1.4) for lowercase
  if (isLower) {
    bgCtx.strokeStyle = '#eee';
    bgCtx.lineWidth = 1;
    const [, descY] = coordToPixel(0, 1.4, s);
    bgCtx.beginPath(); bgCtx.moveTo(0, descY); bgCtx.lineTo(w, descY); bgCtx.stroke();
  }

  // Draw the actual letter using Andika, sized to match index.html's coordinate system
  // Measure cap height and x-height at a reference size, then scale so they fill the grid
  bgCtx.fillStyle = 'rgba(0,0,0,0.15)';
  const refFS = 500;
  const fontFam = "'Andika', sans-serif";

  function measureInk(ch, fs) {
    const c = document.createElement('canvas');
    const pad = Math.ceil(fs * 1.5);
    c.width = pad * 2; c.height = pad * 2;
    const cx2 = c.getContext('2d');
    cx2.font = `${fs}px ${fontFam}`;
    cx2.textBaseline = 'alphabetic';
    cx2.fillText(ch, 10, pad);
    const d = cx2.getImageData(0, 0, c.width, c.height).data;
    let top = c.height, bot = 0;
    for (let y2 = 0; y2 < c.height; y2++)
      for (let x2 = 0; x2 < c.width; x2++)
        if (d[(y2 * c.width + x2) * 4 + 3] > 20) { if (y2 < top) top = y2; if (y2 > bot) bot = y2; }
    return { above: pad - top, below: bot - pad };
  }

  // In the coord system, y=0..1 = cap height region (s pixels on screen)
  // For uppercase: size font so cap height ('O') = s pixels
  // For lowercase: size font so x-height ('o') = 0.5 * s pixels (midline to baseline)
  const capInk = measureInk('O', refFS);
  const xInk = measureInk('o', refFS);
  let fontSize;
  if (isLower) {
    fontSize = (0.5 * s) / xInk.above * refFS * 1.10; // match index.html's 1.10 factor
  } else {
    fontSize = s / capInk.above * refFS;
  }
  bgCtx.font = `${fontSize}px ${fontFam}`;
  bgCtx.textBaseline = 'alphabetic';
  // Measure advance width at this fontSize to compute scaleX matching index.html
  const charAdvanceWidth = bgCtx.measureText(currentChar).width;
  renderScaleX = charAdvanceWidth / data.w;
  bgCtx.fillText(currentChar, 20, baseY);

  // Draw strokes
  olCtx.clearRect(0, 0, w, h);
  data.strokes.forEach((stroke, idx) => {
    const color = STROKE_COLORS[idx % STROKE_COLORS.length];
    const [cx, cy] = coordToPixel(stroke.start[0], stroke.start[1], s);
    const r = Math.max(8, s * 0.04);

    // Draw arrow
    const rad = stroke.angle * Math.PI / 180;
    const arrowLen = Math.max(16, s * 0.12);
    const ax = cx + Math.cos(rad) * (r + arrowLen);
    const ay = cy + Math.sin(rad) * (r + arrowLen);
    const headLen = arrowLen * 0.45;

    // Arrow shaft
    olCtx.strokeStyle = color;
    olCtx.lineWidth = Math.max(2, s * 0.015);
    olCtx.beginPath();
    olCtx.moveTo(cx + Math.cos(rad) * r, cy + Math.sin(rad) * r);
    olCtx.lineTo(ax, ay);
    olCtx.stroke();

    // Arrowhead
    olCtx.fillStyle = color;
    olCtx.beginPath();
    const backAngle = Math.PI * 0.82;
    olCtx.moveTo(ax, ay);
    olCtx.lineTo(ax + Math.cos(rad + backAngle) * headLen, ay + Math.sin(rad + backAngle) * headLen);
    olCtx.lineTo(ax + Math.cos(rad - backAngle) * headLen, ay + Math.sin(rad - backAngle) * headLen);
    olCtx.closePath();
    olCtx.fill();

    // Circle
    olCtx.fillStyle = color;
    olCtx.beginPath();
    olCtx.arc(cx, cy, r, 0, Math.PI * 2);
    olCtx.fill();

    // Number
    olCtx.fillStyle = '#fff';
    olCtx.font = `bold ${Math.max(8, r * 1.2)}px Arial`;
    olCtx.textAlign = 'center';
    olCtx.textBaseline = 'middle';
    olCtx.fillText(idx + 1, cx, cy);
  });
}

function updateStrokeInfo() {
  const container = document.getElementById('stroke-info');
  const data = strokeData[currentChar];
  if (!data) { container.innerHTML = ''; return; }

  container.innerHTML = `<strong>${currentChar}</strong> (w: ${data.w}) — ${data.strokes.length} stroke(s)<br>`;
  data.strokes.forEach((stroke, idx) => {
    const color = STROKE_COLORS[idx % STROKE_COLORS.length];
    const row = document.createElement('div');
    row.className = 'stroke-row';
    row.innerHTML = `
      <span class="color-dot" style="background:${color}"></span>
      <strong>${idx + 1}</strong>
      x: <input type="number" step="0.01" value="${stroke.start[0].toFixed(2)}" style="width:60px"
        onchange="updateStrokeStart('${currentChar}', ${idx}, 0, this.value)">
      y: <input type="number" step="0.01" value="${stroke.start[1].toFixed(2)}" style="width:60px"
        onchange="updateStrokeStart('${currentChar}', ${idx}, 1, this.value)">
      angle: <input type="number" step="5" value="${stroke.angle}" class="angle-input"
        onchange="updateAngle('${currentChar}', ${idx}, this.value)">
      <button onclick="removeStroke('${currentChar}', ${idx})" style="color:red;cursor:pointer" title="Remove stroke">✕</button>
    `;
    container.appendChild(row);
  });
  // Add stroke button
  const addBtn = document.createElement('button');
  addBtn.textContent = '+ Add stroke';
  addBtn.style.cssText = 'margin-top:6px;cursor:pointer;padding:4px 10px;';
  addBtn.onclick = () => addStroke(currentChar);
  container.appendChild(addBtn);
}

window.removeStroke = function(ch, idx) {
  strokeData[ch].strokes.splice(idx, 1);
  modified.add(ch);
  updateButtonStyles();
  render();
  updateStrokeInfo();
};

window.addStroke = function(ch) {
  strokeData[ch].strokes.push({
    d: 'M 0.20,0.50 L 0.40,0.50',
    start: [0.20, 0.50],
    angle: 0,
  });
  modified.add(ch);
  updateButtonStyles();
  render();
  updateStrokeInfo();
};

window.updateStrokeStart = function(ch, idx, axis, val) {
  strokeData[ch].strokes[idx].start[axis] = parseFloat(val);
  modified.add(ch);
  updateButtonStyles();
  render();
};

window.updateAngle = function(ch, idx, val) {
  strokeData[ch].strokes[idx].angle = parseFloat(val);
  modified.add(ch);
  updateButtonStyles();
  render();
};

// Dragging
overlay.addEventListener('mousedown', e => {
  const rect = overlay.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const { s } = getCanvasSize();
  const data = strokeData[currentChar];
  if (!data) return;

  const r = Math.max(8, s * 0.04);
  for (let i = 0; i < data.strokes.length; i++) {
    const [cx, cy] = coordToPixel(data.strokes[i].start[0], data.strokes[i].start[1], s);
    const dist = Math.hypot(mx - cx, my - cy);
    if (dist < r + 4) {
      dragging = { strokeIdx: i };
      return;
    }
  }
});

overlay.addEventListener('mousemove', e => {
  if (!dragging) return;
  const rect = overlay.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const { s } = getCanvasSize();
  const [nx, ny] = pixelToCoord(mx, my, s);

  strokeData[currentChar].strokes[dragging.strokeIdx].start = [
    Math.round(nx * 100) / 100,
    Math.round(ny * 100) / 100,
  ];
  modified.add(currentChar);
  updateButtonStyles();
  render();
  updateStrokeInfo();
});

overlay.addEventListener('mouseup', () => { dragging = null; });
overlay.addEventListener('mouseleave', () => { dragging = null; });

// Scale slider
document.getElementById('scale').addEventListener('input', e => {
  scale = parseFloat(e.target.value);
  document.getElementById('scale-val').textContent = scale;
  render();
});

// Reset
document.getElementById('reset-btn').addEventListener('click', () => {
  const orig = ORIGINAL_STROKE_DATA[currentChar];
  if (!orig) return;
  strokeData[currentChar] = cloneData({ [currentChar]: orig })[currentChar];
  modified.delete(currentChar);
  updateButtonStyles();
  render();
  updateStrokeInfo();
  document.getElementById('status').textContent = `Reset ${currentChar}`;
});

// Export modified
document.getElementById('export-btn').addEventListener('click', () => {
  exportChars([...modified].sort());
});

document.getElementById('export-all-btn').addEventListener('click', () => {
  exportChars(Object.keys(strokeData).sort());
});

function exportChars(chars) {
  if (chars.length === 0) {
    document.getElementById('output').value = '// No modifications';
    return;
  }
  let out = '';
  for (const ch of chars) {
    const data = strokeData[ch];
    const strokes = data.strokes.map(s => {
      return `        { d: '${s.d}', start: [${s.start[0].toFixed(2)}, ${s.start[1].toFixed(2)}], angle: ${s.angle} }`;
    }).join(',\n');
    out += `      '${ch}': { w: ${data.w}, strokes: [\n${strokes},\n      ]},\n`;
  }
  document.getElementById('output').value = out;
  document.getElementById('status').textContent = `Exported ${chars.length} letter(s)`;
}

// Init
buildGrid();
selectChar('A');
</script>
</body>
</html>
